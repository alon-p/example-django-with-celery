
services:
  nginx:
    image: nginx:latest
    container_name: nginx_example_django_with_celery
    ports:
      - "8000:8080"
    volumes:
      - ./nginx_compose:/etc/nginx/conf.d
      - ./data/static:/static
      - ./data/media:/media

    depends_on:
      - web

  db:
    image: postgres:17
    container_name: postgres_example_django_with_celery
    environment:
      - POSTGRES_DB=example_django_with_celery_db #todo
      - POSTGRES_USER=example_django_with_celery_user
      - POSTGRES_PASSWORD=example_django_with_celery_pass
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U example_django_with_celery_user -d example_django_with_celery_db -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    container_name: redis_example_django_with_celery
    image: redis:latest
    hostname: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5
  web:
    build:
      context: .
      dockerfile: ./ecs/Dockerfile

    environment:
      - DJANGO_ALLOWED_HOSTS=web,localhost,127.0.0.1
      - DJANGO_CONFIGURATION=Development
      - DJANGO_MEDIA_ROOT=/media/
      - DJANGO_SETTINGS_MODULE=example_django_with_celery.settings
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8000
      - DATABASE_URL=postgresql://example_django_with_celery_user:example_django_with_celery_pass@db/example_django_with_celery_db
    command:
      - bash
      - -c
      - |
        python manage.py migrate
        python manage.py createsuperuser --username admin --email admin@admin.com --noinput && cat <<-000 | python manage.py shell
        from django.contrib.auth import get_user_model
        admin = get_user_model().objects.get(username='admin')
        admin.set_password('admin')
        admin.save()
        print('Superuser password updated successfully.')
        000
        python manage.py collectstatic --noinput
        cp /srv/app/static/* -r /static/
        gunicorn example_django_with_celery.wsgi --timeout 180 --bind 0.0.0.0 --reload

    volumes:
      - ./data/static:/static
      - ./data/media:/media
      - .:/srv/app # Mount the local folder directly, so no need for extra build

    expose:
      - "8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  celery_worker:
    build:
      context: .
      dockerfile: ./ecs/Dockerfile
    environment:
      - DJANGO_ALLOWED_HOSTS=web,localhost,127.0.0.1
      - DJANGO_CONFIGURATION=Development
      - DJANGO_MEDIA_ROOT=/media/
      - DJANGO_SETTINGS_MODULE=example_django_with_celery.settings
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost:8000
      - DATABASE_URL=postgresql://example_django_with_celery_user:example_django_with_celery_pass@db/example_django_with_celery_db
      - DJANGO_CACHEOPS_REDIS=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False

    command:
      - bash
      - -c
      - celery -A example_django_with_celery worker --loglevel=DEBUG

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

